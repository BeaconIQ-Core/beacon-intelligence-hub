<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hero Animation</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#020810;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  #hero-wrap{position:relative;width:100%;max-width:1200px;height:620px;background:#050d1a;overflow:hidden;border-radius:16px;cursor:none}
  canvas#bg{position:absolute;inset:0;width:100%;height:100%}
  .hero-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:2rem;pointer-events:none}
  .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,179,237,0.12);border:1px solid rgba(99,179,237,0.3);border-radius:20px;padding:5px 14px;font-size:12px;color:#63b3ed;letter-spacing:0.08em;margin-bottom:1.5rem}
  .badge-dot{width:6px;height:6px;border-radius:50%;background:#63b3ed;animation:pulse-dot 2s infinite}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
  h1{font-size:clamp(2rem,5vw,3.4rem);font-weight:500;color:#e8f4ff;line-height:1.18;max-width:640px;margin-bottom:1.2rem}
  h1 em{font-style:normal;color:#63b3ed}
  .sub{font-size:15px;color:rgba(180,210,240,0.65);max-width:480px;line-height:1.7;margin-bottom:2rem}
  .cta-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;pointer-events:all}
  .btn-primary{background:linear-gradient(135deg,#1a6fd4,#0ea5e9);border:none;border-radius:8px;padding:11px 28px;font-size:14px;color:#fff;cursor:pointer;font-weight:500;transition:opacity .2s}
  .btn-primary:hover{opacity:.85}
  .btn-ghost{background:transparent;border:1px solid rgba(99,179,237,0.35);border-radius:8px;padding:11px 28px;font-size:14px;color:#7ec8e3;cursor:pointer;transition:border-color .2s}
  .btn-ghost:hover{border-color:rgba(99,179,237,0.7)}
  .stats{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:40px;z-index:10;pointer-events:none}
  .stat{text-align:center}
  .stat-num{font-size:22px;font-weight:500;color:#e8f4ff}
  .stat-lbl{font-size:11px;color:rgba(180,210,240,0.5);letter-spacing:.06em;margin-top:2px}

  /* custom cursor ring */
  #cursor-ring{position:absolute;width:36px;height:36px;border:1.5px solid rgba(14,165,233,0.7);border-radius:50%;pointer-events:none;z-index:100;transform:translate(-50%,-50%);transition:width .2s,height .2s,opacity .2s;mix-blend-mode:screen}
  #cursor-dot{position:absolute;width:5px;height:5px;background:#0ea5e9;border-radius:50%;pointer-events:none;z-index:101;transform:translate(-50%,-50%)}
</style>
</head>
<body>

<div id="hero-wrap">
  <canvas id="bg"></canvas>
  <div id="cursor-ring"></div>
  <div id="cursor-dot"></div>
  <div class="hero-content">
    <div class="badge"><span class="badge-dot"></span>AI-Powered Intelligence</div>
    <h1>Intelligence<br>Engineered for <em>Tomorrow</em></h1>
    <p class="sub">Building transformative AI systems that redefine what's possible — from autonomous agents to intelligent infrastructure.</p>
    <div class="cta-row">
      <button class="btn-primary">Explore Solutions</button>
      <button class="btn-ghost">Watch Demo</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num">150+</div><div class="stat-lbl">AI Models</div></div>
    <div class="stat"><div class="stat-num">40+</div><div class="stat-lbl">Industries</div></div>
    <div class="stat"><div class="stat-num">12</div><div class="stat-lbl">Countries</div></div>
    <div class="stat"><div class="stat-num">8</div><div class="stat-lbl">Awards</div></div>
  </div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('hero-wrap');
const cursorRing = document.getElementById('cursor-ring');
const cursorDot = document.getElementById('cursor-dot');

function resize(){
  canvas.width = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

const W = ()=>canvas.width, H = ()=>canvas.height;

/* ── Mouse state ── */
let mouse = {x:-300, y:-300, px:-300, py:-300, inside:false};
let ripples = [];       // shockwave rings on move
let lastRippleTime = 0;

wrap.addEventListener('mouseenter', ()=>{ mouse.inside=true; cursorRing.style.opacity='1'; cursorDot.style.opacity='1'; });
wrap.addEventListener('mouseleave', ()=>{ mouse.inside=false; mouse.x=-300; mouse.y=-300; cursorRing.style.opacity='0'; cursorDot.style.opacity='0'; });
wrap.addEventListener('mousemove', e=>{
  const r = wrap.getBoundingClientRect();
  mouse.px = mouse.x; mouse.py = mouse.y;
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;

  /* custom cursor position */
  cursorRing.style.left = mouse.x+'px';
  cursorRing.style.top  = mouse.y+'px';
  cursorDot.style.left  = mouse.x+'px';
  cursorDot.style.top   = mouse.y+'px';

  /* spawn ripple on movement */
  const now = Date.now();
  const dx = mouse.x-mouse.px, dy = mouse.y-mouse.py;
  const speed = Math.sqrt(dx*dx+dy*dy);
  if(now - lastRippleTime > 80 && speed > 4){
    ripples.push({ x:mouse.x, y:mouse.y, r:0, maxR:90+speed*1.2, alpha:0.55, speed:2.5+speed*0.08 });
    lastRippleTime = now;
  }
});

/* ── Nodes ── */
const NODE_COUNT = 60;
const nodes = [];
function mkNode(i){
  return {
    x: Math.random()*1200, y: Math.random()*620,
    ox:0, oy:0,           // original pos (set after resize)
    vx:(Math.random()-0.5)*0.32, vy:(Math.random()-0.5)*0.32,
    r: Math.random()*2.2+1,
    baseR: 0,
    opacity: Math.random()*0.45+0.2,
    pulse: Math.random()*Math.PI*2,
    pulseSpeed: 0.018+Math.random()*0.018
  };
}
for(let i=0;i<NODE_COUNT;i++){
  const n=mkNode(i);
  n.x=Math.random()*1200; n.y=Math.random()*620;
  n.baseR=n.r;
  nodes.push(n);
}

/* ── Data streams ── */
const dataStreams=[];
function mkStream(){
  const a=nodes[Math.floor(Math.random()*nodes.length)];
  const b=nodes[Math.floor(Math.random()*nodes.length)];
  return { from:a, to:b, t:0, speed:0.004+Math.random()*0.006, width:Math.random()*1.5+0.5 };
}
for(let i=0;i<9;i++) dataStreams.push(mkStream());

/* ═══════════════════════════════════════
   DRAW FUNCTIONS
═══════════════════════════════════════ */

function drawGrid(){
  ctx.strokeStyle='rgba(56,100,160,0.07)';
  ctx.lineWidth=0.5;
  const gap=60;
  for(let x=0;x<W();x+=gap){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H());ctx.stroke(); }
  for(let y=0;y<H();y+=gap){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W(),y);ctx.stroke(); }
}

/* 1. SPOTLIGHT — large soft cone of light that follows cursor */
function drawSpotlight(){
  if(!mouse.inside) return;
  const g=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,220);
  g.addColorStop(0,  'rgba(14,165,233,0.055)');
  g.addColorStop(0.5,'rgba(14,165,233,0.022)');
  g.addColorStop(1,  'rgba(14,165,233,0)');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(mouse.x,mouse.y,220,0,Math.PI*2); ctx.fill();
}

/* 2. RIPPLE / SHOCKWAVE — expanding rings from cursor movement */
function drawRipples(){
  for(let i=ripples.length-1;i>=0;i--){
    const rp=ripples[i];
    rp.r += rp.speed;
    rp.alpha *= 0.93;
    if(rp.r>=rp.maxR || rp.alpha<0.01){ ripples.splice(i,1); continue; }
    const fade = 1 - rp.r/rp.maxR;
    ctx.strokeStyle=`rgba(14,165,233,${rp.alpha*fade})`;
    ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2); ctx.stroke();
  }
}

function drawOrb(){
  const cx=W()*0.72, cy=H()*0.32, r=130;
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  grd.addColorStop(0,'rgba(14,165,233,0.18)');
  grd.addColorStop(0.4,'rgba(59,130,246,0.10)');
  grd.addColorStop(1,'rgba(5,13,26,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(14,165,233,0.13)'; ctx.lineWidth=1;
  for(let i=1;i<=3;i++){ ctx.beginPath(); ctx.arc(cx,cy,r*i/3,0,Math.PI*2); ctx.stroke(); }
  const now=Date.now()*0.0006;
  for(let i=0;i<3;i++){
    const angle=now+i*(Math.PI*2/3);
    const ox=cx+Math.cos(angle)*r*0.65;
    const oy=cy+Math.sin(angle)*r*0.24;
    const gr2=ctx.createRadialGradient(ox,oy,0,ox,oy,10);
    gr2.addColorStop(0,'rgba(99,179,237,0.7)'); gr2.addColorStop(1,'rgba(99,179,237,0)');
    ctx.fillStyle=gr2; ctx.beginPath(); ctx.arc(ox,oy,10,0,Math.PI*2); ctx.fill();
  }
}

/* 3. CONNECTIONS + MOUSE ATTRACTION LINES */
function drawConnections(){
  const dist=140;
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<dist){
        const a=(1-d/dist)*0.17;
        ctx.strokeStyle=`rgba(56,130,220,${a})`; ctx.lineWidth=0.6;
        ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.stroke();
      }
    }
    /* attraction lines to cursor */
    if(mouse.inside){
      const mdx=nodes[i].x-mouse.x, mdy=nodes[i].y-mouse.y;
      const md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md<180){
        const a=(1-md/180)*0.5;
        ctx.strokeStyle=`rgba(14,165,233,${a})`; ctx.lineWidth=0.9;
        ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(mouse.x,mouse.y); ctx.stroke();
      }
    }
  }
}

/* 4. NODES with proximity brightness + size swell */
function drawNodes(){
  nodes.forEach(n=>{
    n.pulse+=n.pulseSpeed;
    const glow=0.5+0.5*Math.sin(n.pulse);

    /* proximity to cursor → swell & brighten */
    let proxFactor=0;
    if(mouse.inside){
      const dx=n.x-mouse.x, dy=n.y-mouse.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      proxFactor=Math.max(0, 1-d/160);
    }
    const displayR = n.baseR + proxFactor*5;
    const brightness = n.opacity*(0.6+glow*0.4) + proxFactor*0.7;

    ctx.fillStyle=`rgba(99,179,237,${Math.min(brightness,1)})`;
    ctx.beginPath(); ctx.arc(n.x,n.y,displayR,0,Math.PI*2); ctx.fill();

    /* outer glow ring when near cursor OR during pulse peak */
    if(proxFactor>0.15 || glow>0.75){
      const glowR = displayR*(proxFactor>0.15?4.5:3.5);
      const glowA = proxFactor>0.15 ? proxFactor*0.45 : (glow-0.75)*0.25;
      ctx.fillStyle=`rgba(14,165,233,${glowA})`;
      ctx.beginPath(); ctx.arc(n.x,n.y,glowR,0,Math.PI*2); ctx.fill();
    }
  });
}

function drawStreams(){
  dataStreams.forEach((s,i)=>{
    s.t+=s.speed;
    if(s.t>=1){ s.t=0; dataStreams[i]=mkStream(); return; }
    const x=s.from.x+(s.to.x-s.from.x)*s.t;
    const y=s.from.y+(s.to.y-s.from.y)*s.t;
    const head=ctx.createRadialGradient(x,y,0,x,y,8);
    head.addColorStop(0,'rgba(14,165,233,0.9)'); head.addColorStop(1,'rgba(14,165,233,0)');
    ctx.fillStyle=head; ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill();
    const tail=0.08;
    const tx=s.from.x+(s.to.x-s.from.x)*Math.max(0,s.t-tail);
    const ty=s.from.y+(s.to.y-s.from.y)*Math.max(0,s.t-tail);
    const grd=ctx.createLinearGradient(tx,ty,x,y);
    grd.addColorStop(0,'rgba(14,165,233,0)'); grd.addColorStop(1,'rgba(14,165,233,0.55)');
    ctx.strokeStyle=grd; ctx.lineWidth=s.width;
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(x,y); ctx.stroke();
  });
}

/* 5. PARTICLE REPULSION — nodes flee from cursor */
const REPEL_RADIUS=110, REPEL_FORCE=0.55;
function applyRepulsion(){
  if(!mouse.inside) return;
  nodes.forEach(n=>{
    const dx=n.x-mouse.x, dy=n.y-mouse.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<REPEL_RADIUS && d>0){
      const force=REPEL_FORCE*(1-d/REPEL_RADIUS);
      n.vx+=dx/d*force;
      n.vy+=dy/d*force;
    }
    /* damping so they don't fly off */
    n.vx*=0.92; n.vy*=0.92;
    /* max speed cap */
    const spd=Math.sqrt(n.vx*n.vx+n.vy*n.vy);
    if(spd>2.2){ n.vx=n.vx/spd*2.2; n.vy=n.vy/spd*2.2; }
  });
}

function moveNodes(){
  nodes.forEach(n=>{
    n.x+=n.vx; n.y+=n.vy;
    if(n.x<0||n.x>W()) n.vx*=-1;
    if(n.y<0||n.y>H()) n.vy*=-1;
  });
}

/* ── Main loop ── */
function frame(){
  ctx.clearRect(0,0,W(),H());
  drawGrid();
  drawSpotlight();   /* 1. spotlight cone */
  drawRipples();     /* 2. shockwave rings */
  drawOrb();
  drawConnections(); /* 3. lines + cursor attraction */
  drawStreams();
  drawNodes();       /* 4. node swell + brightness */
  applyRepulsion();  /* 5. particle repulsion physics */
  moveNodes();
  requestAnimationFrame(frame);
}
frame();
</script>

</body>
</html>
